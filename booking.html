<section class="booking-container">

<h1>

Booking Kamar

</h1>

<p>

Silakan lengkapi data pemesanan.

</p>

<form id="bookingForm">

<div class="booking-grid">

<div class="left-booking">

<label>

Nama Pemesan

</label>

<input
type="text"
id="nama"
placeholder="Nama Lengkap">

<label>

Jenis Kamar

</label>

<select id="jenisKamar">

<option>Kamar Istirahat</option>

<option>Kamar Standar</option>

<option>Kamar VIP</option>

</select>

<label>

Check In

</label>

<input
type="date"
id="checkin">

<label>

Check Out

</label>

<input
type="date"
id="checkout">

<label>

Jumlah Tamu

</label>

<input
type="number"
id="tamu"
min="1"
value="1">

<label>

Kode Promo

</label>

<input
type="text"
placeholder="Contoh : KENCONO10">

</div>

<div class="right-booking">

<img
src="images/kamar3.jpg"
alt="Kamar">

<h2>

Ringkasan Booking

</h2>

<table>

<tr>

<td>Harga / Malam</td>

<td id="harga">

Rp750.000

</td>

</tr>

<tr>

<td>Jumlah Malam</td>

<td id="malam">

0

</td>

</tr>

<tr>

<td>Total</td>

<td id="total">

Rp0

</td>

</tr>

</table>

<button
type="submit">

Booking Sekarang

</button>

</div>

</div>

</form>

</section>
